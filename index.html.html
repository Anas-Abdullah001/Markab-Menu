<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markab Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garnet:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--cream:#F2E9DB;--green:#374732;--gold:#AA9850;--red:#7A3226;--black:#1A1A18;--sage:#C4C6A8;--sage-lt:#E6E9D6;--teal:#536D68;}
html,body{height:100%;overflow:hidden;background:var(--cream);}
body{font-family:"Jost",sans-serif;color:var(--black);display:flex;flex-direction:column;}
.hdr{background:var(--green);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:2px solid var(--gold);}
.hdr-left{display:flex;flex-direction:column;align-items:flex-start;}
.logo-img{height:64px;width:auto;}
.hdr-sub{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-top:3px;}
.hdr-right{display:flex;align-items:center;gap:16px;}
.clock-area{text-align:right;}
.clock{font-family:"Cormorant Garnet",serif;font-size:26px;font-weight:500;color:var(--cream);}
.datex{font-size:10px;color:var(--sage);letter-spacing:2px;margin-top:1px;}
.lang-btn{background:rgba(242,233,219,.12);border:1px solid var(--gold);color:var(--gold);font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border-radius:4px;cursor:pointer;font-family:"Jost",sans-serif;white-space:nowrap;}
.lang-btn:hover{background:rgba(242,233,219,.22);}
.tabs{background:var(--cream);display:flex;border-bottom:1px solid var(--sage);overflow-x:auto;flex-shrink:0;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:13px 20px;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--teal);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:600;}
.tab:hover:not(.active){color:var(--green);}
.content{flex:1;overflow-y:auto;padding:24px;background:var(--cream);scrollbar-width:thin;scrollbar-color:var(--sage) transparent;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:var(--sage);border-radius:3px;}
.cat-hdr{margin-bottom:6px;padding-bottom:14px;border-bottom:1px solid var(--sage);}
.cat-eyebrow{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.cat-title{font-family:"Cormorant Garnet",serif;font-size:30px;font-weight:600;color:var(--green);}
.cat-title.ar-font{font-size:26px;}
.cat-desc{font-size:12px;color:var(--teal);line-height:1.7;margin-bottom:20px;font-style:italic;}
.sec-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin:20px 0 10px;display:flex;align-items:center;gap:10px;}
.sec-label::after{content:"";flex:1;height:1px;background:var(--sage);}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.card{background:#fff;border:1px solid var(--sage-lt);border-radius:6px;padding:16px;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;position:relative;overflow:hidden;}
.card::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--green);opacity:0;transition:opacity .2s;}
.card:hover{transform:translateY(-2px);border-color:var(--sage);box-shadow:0 4px 16px rgba(55,71,50,.08);}
.card:hover::after{opacity:1;}
.card.feat{border-color:var(--gold);}
.card.feat::after{opacity:1;background:var(--gold);}
.card.tbd{border-style:dashed;border-color:var(--sage);opacity:.85;}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px;}
.card-badge{display:inline-block;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);background:var(--sage-lt);padding:2px 7px;border-radius:2px;}
.card-badge.charge{background:rgba(170,152,80,.15);color:var(--gold);}
.card-badge.tbd-badge{background:rgba(122,50,38,.1);color:var(--red);}
.card-badge.coming{background:rgba(83,109,104,.12);color:var(--teal);}
.card-name{font-family:"Cormorant Garnet",serif;font-size:17px;font-weight:600;color:var(--green);line-height:1.2;margin-bottom:5px;}
.card-name.ar-font{font-size:16px;line-height:1.4;}
.card-sub{font-size:11px;color:var(--teal);line-height:1.6;margin-bottom:8px;}
.card-detail-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px;}
.detail-tag{font-size:9px;padding:1px 6px;border-radius:2px;}
.detail-tag.allergy{background:rgba(122,50,38,.08);color:var(--red);}
.detail-tag.cal{background:rgba(170,152,80,.12);color:var(--gold);}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
.card-price{font-family:"Cormorant Garnet",serif;font-size:20px;font-weight:600;color:var(--red);}
.card-price span{font-family:"Jost",sans-serif;font-size:11px;font-weight:300;color:var(--teal);}
.otags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px;}
.otag{font-size:9px;padding:2px 6px;border-radius:2px;font-weight:500;}
.otag-o{background:var(--sage-lt);color:var(--teal);}
.otag-p{background:rgba(170,152,80,.12);color:var(--gold);}
.bean-details{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:8px 0;}
.bean-detail{font-size:9px;color:var(--teal);}
.bean-detail span{color:var(--black);font-weight:500;}
.so-note{background:rgba(170,152,80,.08);border:1px solid rgba(170,152,80,.25);border-radius:6px;padding:12px 16px;margin-bottom:20px;font-size:12px;color:var(--teal);font-style:italic;}
.zero-note{font-size:9px;color:var(--teal);font-style:italic;margin-top:3px;}
.sparkling-card{background:#fff;border:1px solid var(--gold);border-radius:6px;padding:16px;position:relative;overflow:hidden;cursor:default;}
.sparkling-card::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);}
.sparkling-title{font-family:"Cormorant Garnet",serif;font-size:17px;font-weight:600;color:var(--green);margin-bottom:4px;}
.sparkling-sub{font-size:11px;color:var(--teal);margin-bottom:10px;}
.sparkling-options{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.sp-opt{font-size:10px;color:var(--teal);padding:5px 8px;background:var(--sage-lt);border-radius:4px;line-height:1.4;}
.sp-opt .sp-name{font-weight:500;color:var(--green);}
.milk-note{font-size:12px;color:var(--teal);font-style:italic;margin-bottom:16px;}
.milk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px;}
.milk-card{background:#fff;border:1px solid var(--sage-lt);border-radius:6px;padding:16px;text-align:center;}
.milk-card.vegan{border-color:var(--gold);}
.milk-icon{font-size:22px;margin-bottom:6px;}
.milk-name{font-family:"Cormorant Garnet",serif;font-size:15px;font-weight:600;color:var(--green);margin-bottom:4px;}
.milk-tag{display:inline-block;font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:2px;}
.milk-tag.veg{background:rgba(170,152,80,.15);color:var(--gold);}
.milk-tag.std{background:var(--sage-lt);color:var(--teal);}
.overlay{position:fixed;inset:0;background:rgba(30,25,20,.85);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(4px);}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--cream);border-radius:10px;padding:28px;max-width:500px;width:90%;border:1px solid var(--sage);transform:translateY(16px);transition:transform .22s;position:relative;max-height:86vh;overflow-y:auto;}
.overlay.open .modal{transform:translateY(0);}
.modal-close{position:sticky;top:0;float:right;width:28px;height:28px;background:var(--sage-lt);border:none;border-radius:50%;cursor:pointer;font-size:14px;color:var(--teal);z-index:2;}
.modal-name{font-family:"Cormorant Garnet",serif;font-size:24px;font-weight:600;color:var(--green);margin-bottom:8px;clear:right;}
.modal-sub{font-size:13px;color:var(--teal);line-height:1.7;margin-bottom:14px;}
.modal-section{margin-bottom:14px;}
.modal-sec-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.modal-tags{display:flex;gap:5px;flex-wrap:wrap;}
.modal-tag{font-size:11px;background:var(--sage-lt);color:var(--teal);padding:3px 10px;border-radius:3px;}
.modal-tag.allergy{background:rgba(122,50,38,.08);color:var(--red);}
.modal-tag.cal{background:rgba(170,152,80,.12);color:var(--gold);font-weight:500;}
.modal-bean-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.md{background:#fff;border-radius:5px;padding:10px;border:1px solid var(--sage-lt);}
.md-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:3px;}
.md-val{font-size:12px;color:var(--green);font-weight:500;}
.modal-div{height:1px;background:var(--sage);margin:14px 0;}
.modal-price{font-family:"Cormorant Garnet",serif;font-size:28px;font-weight:600;color:var(--red);}
.modal-price span{font-family:"Jost",sans-serif;font-size:13px;font-weight:300;color:var(--teal);}
.ar-font{font-family:"Noto Naskh Arabic",serif !important;}
.rtl .tabs{direction:rtl;}
.rtl .card,.rtl .sparkling-card{text-align:right;}
.rtl .badges{justify-content:flex-end;}
.rtl .card-foot{flex-direction:row-reverse;}
.rtl .otags,.rtl .card-detail-row,.rtl .sparkling-options{direction:rtl;}
.rtl .sec-label{flex-direction:row-reverse;}
.rtl .sec-label::after{order:-1;}
.rtl .cat-hdr,.rtl .so-note,.rtl .milk-note{text-align:right;}
.rtl .modal{text-align:right;}
.rtl .modal-close{float:left;}
.rtl .modal-tags,.rtl .bean-details{direction:rtl;}
.rtl .hdr-left{align-items:flex-start;}
</style>
</head>

function toggleLang(){isAr=!isAr;document.getElementById("lang-btn").innerHTML=isAr?"EN":"&#x0639;&#x0631;&#x0628;&#x064A;";document.documentElement.dir=isAr?"rtl":"ltr";document.documentElement.lang=isAr?"ar":"en";document.body.classList.toggle("rtl",isAr);buildTabs();render(isAr?D.ar[cur]:D.en[cur]);}
function buildTabs(){var t=document.getElementById("tabs"),lb=isAr?TABS_AR:TABS_EN;t.innerHTML="";lb.forEach(function(l,i){var d=document.createElement("div");d.className="tab"+(i===cur?" active":"");d.textContent=l;if(isAr)d.classList.add("ar-font");d.onclick=function(){show(i);};t.appendChild(d);});}
function show(i){cur=i;buildTabs();render(isAr?D.ar[i]:D.en[i]);document.getElementById("content").scrollTop=0;}

function render(cat){
  var af=isAr?"ar-font":"",h="";
  h+="<div class=\"cat-hdr\"><div class=\"cat-eyebrow\">"+(isAr?"مركب كافيه":"Markab Caf\xe9")+"</div><div class=\"cat-title "+af+"\">"+cat.icon+" "+cat.title+"</div></div><div class=\"cat-desc "+af+"\">"+cat.desc+"</div>";
  if(cat.milkPage){
    var ms=isAr?MILKS.ar:MILKS.en,vi=0,vicons=["&#x1F33E;","&#x1F330;","&#x1FAD8;","&#x1F965;"];
    h+="<div class=\"milk-note "+af+"\">"+( isAr?"جميع أنواع الحليب العادية مجانية. الحليب النباتي +4 ريال.":"Standard milks included. Vegan alternatives +4 SAR.")+"</div>";
    h+="<div class=\"sec-label "+af+"\">"+(isAr?"حليب عادي":"Standard Milk")+"</div><div class=\"milk-grid\">";
    ms.filter(function(m){return!m.vegan;}).forEach(function(m){h+="<div class=\"milk-card\"><div class=\"milk-icon\">&#x1F95B;</div><div class=\"milk-name "+af+"\">"+m.name+"</div><span class=\"milk-tag std "+af+"\">"+m.tag+"</span></div>";});
    h+="</div><div class=\"sec-label "+af+"\">"+(isAr?"حليب نباتي":"Vegan Milk")+"</div><div class=\"milk-grid\">";
    ms.filter(function(m){return m.vegan;}).forEach(function(m){h+="<div class=\"milk-card vegan\"><div class=\"milk-icon\">"+vicons[vi++]+"</div><div class=\"milk-name "+af+"\">"+m.name+"</div><span class=\"milk-tag veg "+af+"\">"+m.tag+"</span></div>";});
    h+="</div>";
    document.getElementById("content").innerHTML=h;return;
  }
  if(cat.displayOnly){h+="<div class=\"so-note "+af+"\">&#x2615; "+(isAr?"هذه بننا الحالية. اسأل الباريستا عن طرق التحضير المتاحة.":"These are our current beans. Ask your barista for today's brew methods.")+"</div>";}
  cat.secs.forEach(function(sec){
    var isO=cur===0,isF=cur===4;
    h+="<div class=\"sec-label "+af+"\">"+sec.title+"</div><div class=\"grid"+(isF?" grid-2":"")+"\">";
    sec.items.forEach(function(item,ii){
      var si=cat.secs.indexOf(sec);
      if(item.sparkling){
        h+="<div class=\"sparkling-card\">";
        h+="<div class=\"badges\"><span class=\"card-badge "+af+"\">"+item.badge+"</span></div>";
        h+="<div class=\"sparkling-title "+af+"\">"+item.name+"</div>";
        h+="<div class=\"sparkling-sub "+af+"\">"+(isAr?"خالي من السكر · صفر سعرات حرارية":"Sugar free · Zero calories")+"</div>";
        h+="<div class=\"sparkling-options\">";
        item.flavours.forEach(function(f){h+="<div class=\"sp-opt\"><span class=\"sp-name "+af+"\">"+f+"</span></div>";});
        h+="</div>";
        h+="<div class=\"card-foot\"><div class=\"card-price\">"+item.price+" <span>"+(isAr?"ريال":"SAR")+"</span></div></div>";
        h+="</div>";
        return;
      }
      h+="<div class=\"card"+(item.feat?" feat":"")+(item.coming?" tbd":"")+"\" onclick=\"openM("+cur+","+si+","+ii+")\">";
      h+="<div class=\"badges\">";
      if(item.badge)h+="<span class=\"card-badge "+af+"\">"+item.badge+"</span>";
      if(item.charge)h+="<span class=\"card-badge charge "+af+"\">"+(isAr?"+4 ريال":"+4 SAR")+"</span>";
      if(item.coming)h+="<span class=\"card-badge coming "+af+"\">"+(isAr?"قريباً":"Coming Soon")+"</span>";
      h+="</div>";
      h+="<div class=\"card-name "+af+"\">"+item.name+"</div>";
      if(isO&&item.origin){
        h+="<div class=\"otags\"><span class=\"otag otag-o\">⊕ "+item.origin+"</span>"+(item.process?"<span class=\"otag otag-p\">"+item.process+"</span>":"")+"</div>";
        h+="<div class=\"bean-details\">";
        if(item.region)h+="<div class=\"bean-detail\">"+(isAr?"منطقة":"Region")+": <span>"+item.region+"</span></div>";
        if(item.variety)h+="<div class=\"bean-detail\">"+(isAr?"نوع":"Variety")+": <span>"+item.variety+"</span></div>";
        if(item.body)h+="<div class=\"bean-detail\">"+(isAr?"القوام":"Body")+": <span>"+item.body+"</span></div>";
        if(item.elev)h+="<div class=\"bean-detail\">"+(isAr?"الارتفاع":"Elev.")+": <span>"+item.elev+"</span></div>";
        h+="</div>";
      }
      h+="<div class=\"card-sub "+af+"\">"+item.sub+"</div>";
      if(item.calories)h+="<div class=\"card-detail-row\"><span class=\"detail-tag cal\">&#x1F525; "+item.calories+"</span></div>";
      if(item.allergies&&item.allergies.length)h+="<div class=\"card-detail-row\">"+item.allergies.map(function(a){return"<span class=\"detail-tag allergy\">"+a+"</span>";}).join("")+"</div>";
      h+="<div class=\"card-foot\">"+(item.price&&item.price!=="TBC"&&item.price!=="يتم التحديد"?"<div class=\"card-price\">"+item.price+" <span>"+(isAr?"ريال":"SAR")+"</span></div>":"")+"</div></div>";
    });
    h+="</div>";
  });
  document.getElementById("content").innerHTML=h;
}

function openM(ci,si,ii){
  var data=isAr?D.ar:D.en,item=data[ci].secs[si].items[ii],isO=ci===0,af=isAr?"ar-font":"";
  var h="";
  if(item.badge)h+="<div style=\"margin-bottom:10px\"><span class=\"card-badge "+af+"\">"+item.badge+"</span>"+(item.coming?"<span class=\"card-badge coming "+af+" \" style=\"margin-left:4px\">"+(isAr?"قريباً":"Coming Soon")+"</span>":"")+"</div>";
  h+="<div class=\"modal-name "+af+"\">"+item.name+"</div>";
  if(item.sub)h+="<div class=\"modal-sub "+af+"\">"+item.sub+"</div>";
  if(isO&&item.notes){
    h+="<div class=\"modal-bean-grid\">";
    h+="<div class=\"md\"><div class=\"md-lbl\">"+(isAr?"المصدر":"Origin")+"</div><div class=\"md-val "+af+"\">"+item.origin+"</div></div>";
    h+="<div class=\"md\"><div class=\"md-lbl\">"+(isAr?"المنطقة":"Region")+"</div><div class=\"md-val "+af+"\">"+item.region+"</div></div>";
    h+="<div class=\"md\"><div class=\"md-lbl\">"+(isAr?"النوع":"Variety")+"</div><div class=\"md-val "+af+"\">"+item.variety+"</div></div>";
    h+="<div class=\"md\"><div class=\"md-lbl\">"+(isAr?"القوام":"Body")+"</div><div class=\"md-val "+af+"\">"+item.body+"</div></div>";
    h+="<div class=\"md\"><div class=\"md-lbl\">"+(isAr?"الارتفاع":"Elevation")+"</div><div class=\"md-val "+af+"\">"+item.elev+"</div></div>";
    h+="<div class=\"md\"><div class=\"md-lbl\">"+(isAr?"طريقة المعالجة":"Process")+"</div><div class=\"md-val "+af+"\">"+item.process+"</div></div>";
    h+="</div>";
    h+="<div class=\"modal-section\"><div class=\"modal-sec-label\">"+(isAr?"نكهات":"Tasting Notes")+"</div><div class=\"modal-tags\"><span class=\"modal-tag "+af+"\">"+item.notes+"</span></div></div>";
  }
  if(item.ingredients&&item.ingredients.length)h+="<div class=\"modal-section\"><div class=\"modal-sec-label\">"+(isAr?"المكونات":"Ingredients")+"</div><div class=\"modal-tags\">"+item.ingredients.map(function(i){return"<span class=\"modal-tag "+af+"\">"+i+"</span>";}).join("")+"</div></div>";
  if(item.calories)h+="<div class=\"modal-section\"><div class=\"modal-sec-label\">"+(isAr?"القيمة الغذائية":"Nutrition")+"</div><div class=\"modal-tags\"><span class=\"modal-tag cal\">"+item.calories+"</span>"+(item.macros?item.macros.map(function(m){return "<span class=\"modal-tag\">"+m+"</span>";}).join(""):"")+"</div></div>";
  if(item.allergies&&item.allergies.length)h+="<div class=\"modal-section\"><div class=\"modal-sec-label\">"+(isAr?"حساسية":"Allergens")+"</div><div class=\"modal-tags\">"+item.allergies.map(function(a){return"<span class=\"modal-tag allergy "+af+"\">"+a+"</span>";}).join("")+"</div></div>";
  h+="<div class=\"modal-div\"></div>";
  h+=item.price&&item.price!=="TBC"&&item.price!=="يتم التحديد"?"<div class=\"modal-price\">"+item.price+" <span>"+(isAr?"ريال":"SAR")+"</span></div>":"<div style=\"font-size:13px;color:var(--teal);font-style:italic\">"+(isAr?"سيتم تحديد السعر":"Price to be confirmed")+"</div>";
  document.getElementById("mc").innerHTML=h;
  document.getElementById("mbox").style.textAlign=isAr?"right":"left";
  document.getElementById("ov").classList.add("open");
}
function closeM(e){if(!e||e.target===document.getElementById("ov")||e.currentTarget.classList&&e.currentTarget.classList.contains("modal-close"))document.getElementById("ov").classList.remove("open");}
function tick(){var n=new Date(),h=String(n.getHours()).padStart(2,"0"),m=String(n.getMinutes()).padStart(2,"0");document.getElementById("clk").textContent=h+":"+m;var days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],mos=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];document.getElementById("dtx").textContent=days[n.getDay()]+" · "+n.getDate()+" "+mos[n.getMonth()]+" "+n.getFullYear();}
tick();setInterval(tick,10000);buildTabs();render(D.en[0]);
</script>
